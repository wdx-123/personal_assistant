mysql:
  host: ""       # 宿主机本地访问 MySQL
  port: 3306
  config: charset=utf8mb4&parseTime=True&loc=Local
  db_name: meta_assist
  username: root
  password: ""
  max_idle_conns: 10    # 连接池空闲最大连接数
  max_open_conns: 100   # 连接池最大打开连接数
  log_mode: silent        # 日志级别
redis:
  address: ""  # 宿主机本地访问 Redis
  password: ""             # Redis 密码（默认）
  db: 0                    # 使用第 0 个数据库
  active_user_state_ttl_seconds: 1800
  active_user_state_ttl_jitter_seconds: 300
system:
  host: 0.0.0.0 # 监听所有本地网卡；外部访问用机器实际IP
  port: 9000 # 服务对外暴露的端口号
  env: dev # 应用运行环境（release=生产环境；dev=开发环境；test=测试环境等）
  router_prefix: controller # API 接口的统一前缀（所有接口路径会以 /controller 开头）
  auto_migrate: true
  use_multipoint: true # 是否启用"多点"能力（如多客户端连接、多节点通信等场景）
  sessions_secret: "" # Session 加密/签名的密钥（保障会话安全）
  default_role_code: "member" # 新用户注册/加入组织时的默认角色代码
  default_role_name: "普通成员" # 默认角色的显示名称
  bind_cool_down_hours: 48 # 换绑冷却时间（小时），防止频繁换绑
security:
  sensitive_data:
    enabled: false               # 敏感数据编解码器总开关；默认关闭，建议通过环境变量开启
    cipher_prefix: "enc:v1:"     # 密文前缀；为空时回落到默认 enc:v1:
    aes_key_base64: ""           # AES-256-GCM 密钥，需通过环境变量注入
    hash_key_base64: ""          # HMAC-SHA256 密钥，需通过环境变量注入
zap:
  level: warn #  日志级别为error：仅记录错误信息，不包含info和debug信息
  filename: log/assist_backed_app.log # 日志文件存储路径及名称：日志会写入项目根目录下的log文件夹，文件名为go_blog.log，便于统一管理和查找
  max_size: 200 # 单个日志文件最大容量为200MB（依赖lumberjack库）：当文件达到200MB时自动切割为旧日志（如go_blog.log.1），避免单文件过大导致查看/备份困难
  max_backups: 30 # 最多保留30个旧日志文件（依赖lumberjack库）：超过30个时自动删除最旧的日志，防止历史日志占用过多磁盘空间
  max_age: 5 # 旧日志文件最多保留5天（依赖lumberjack库）：无论文件是否达到max_backups数量，超过5天的旧日志都会自动清理，控制日志存储周期
  is_console_print: true # 开启控制台日志输出：日志会同时写入文件和打印到终端（如终端窗口），方便开发时实时查看日志，生产环境可设为false仅保留文件日志
# JWT 认证配置
jwt:
  access_token_secret: a8f5f167f44f4964e6c998dee827110c3b2e5a8b5d2f8e4c9a1b3d7f6e0c2a4b  # 访问令牌密钥，用于签名和验证访问令牌
  refresh_token_secret: b9e6e278e55e5a75f7d099eff938221d4c3f6b9c6e3f9f5d0a2c4e8g7f1d3b5c  # 刷新令牌密钥，用于签名和验证刷新令牌
  access_token_expiry_time: 2h   # 访问令牌过期时间，2小时后需要刷新
  refresh_token_expiry_time: 15d  # 刷新令牌过期时间，7天后需要重新登录
  issuer: go_blog system               # JWT 发行者标识，用于标识令牌的发行方

# 文件上传配置
upload:
  size: 20      # 文件上传大小限制，单位MB
  path: uploads # 文件上传保存路径

# 验证码配置
captcha:
  height: 80     # 验证码图片高度，单位像素
  width: 240     # 验证码图片宽度，单位像素
  length: 6      # 验证码字符长度
  max_skew: 0.7  # 字符最大倾斜度，用于增加识别难度
  dot_count: 80  # 干扰点数量，用于防止机器识别

# 邮件发送配置
email:
  host: smtp.qq.com          # SMTP 服务器地址
  port: 465                  # SMTP 服务器端口号
  from: ""  # 发件人邮箱地址
  nickname: 十二         # 发件人显示名称
  secret: ""   # 邮箱授权码或密码
  is_ssl: true               # 是否使用SSL加密连接

# 高德地图API配置
gaode:
  enable: false                           # 是否启用高德地图功能
  key: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx   # 高德地图API密钥

# 个人网站的配置
website:
  logo: ""                                    # 网站小图标/Logo，用于浏览器标签页显示
  full_logo: ""                               # 网站完整Logo，用于页面头部显示
  title: 个人助手                  # 网站标题，显示在浏览器标题栏
  slogan: 标题                             # 网站中文标语/口号
  slogan_en: Blog Title                       # 网站英文标语/口号
  description: 描述                        # 网站描述，用于SEO和页面介绍
  version: 1.0.0                             # 网站版本号
  created_at: "2025-1-15"                    # 网站创建日期
  icp_filing: icp备案号                       # ICP备案号，中国大陆网站必需
  public_security_filing: 公安备案号            # 公安备案号，中国大陆网站必需
  bilibili_url: https://space.bilibili.com/xxx  # B站个人主页链接
  gitee_url: https://gitee.com/xxx           # Gitee个人主页链接
  github_url: https://github.com/xxx/        # GitHub个人主页链接
  blog_url: https://blog.xxx.com             # 个人博客网站链接
  name: 十二                                  # 博主昵称/姓名
  job: 学生                                   # 博主职业/工作
  address: 很神秘的哦                               # 博主所在地址
  email: w13839575053@qq.com                 # 博主联系邮箱
  qq_image: ""                               # QQ二维码图片路径
  wechat_image: ""                           # 微信二维码图片路径

# 存储驱动配置
storage:
  current: "qiniu"   # 默认驱动：local 或 qiniu
  local:
    base_url: ""      # 为空时复用 system.host + static.prefix
    key_prefix: ""    # 对象键前缀（可选）
  qiniu:
    bucket: ""        # 七牛空间名（对应“空间管理”中的“wdx...”）
    domain: ""                    # 访问域名（自有域名，已绑定七牛CDN）
    key_prefix: ""    # 对象键前缀（可选）
    access_key: ""  # AK（可用环境变量覆盖）
    secret_key: ""  # SK（可用环境变量覆盖）
# 静态文件配置
static:
  path: "./static/images"
  prefix: "/images"
  max_size: 16
  max_uploads: 15
  allowed_types:
    - ".png"
    - ".jpeg"
    - ".gif"
    - ".jpg"
    - ".bin"
  max_concurrent_uploads: 50  # 最大并发上传数，0 表示不限
  user_quota_mb: 50          # 单用户最大存储空间（MB），0 表示不限

# 限流配置
rate_limit:
  upload:
    global_limit: 100        # 全局：每窗口最多 100 次上传请求
    global_window_sec: 60    # 全局窗口：60 秒
    user_limit: 10           # 用户：每窗口最多 10 次上传请求
    user_window_sec: 60      # 用户窗口：60 秒

# 爬虫服务配置 (Infrastructure)
crawler:
  leetcode:
    base_url: "http://180.184.87.86:8001"    # 力扣数据服务地址 (FastAPI/Python 服务)
    api_prefix: "/v2"                         # 业务接口统一前缀，置空可回退旧路径
    timeout_ms: 10000                         # 单次请求超时时间 (毫秒)，建议 3000-10000
    max_idle_conns: 100                      # 连接池最大空闲连接数 (全局)
    max_idle_conns_per_host: 40             # 连接池单 Host 最大空闲连接数 (重要：高并发复用关键)
    idle_conn_timeout_sec: 90                # 空闲连接保持时间 (秒)
    retry_count: 2                           # 失败重试次数 (仅限网络错误/503等)
    retry_wait_ms: 200                       # 重试基础等待时间 (毫秒)
    retry_max_wait_ms: 2000                  # 重试最大等待时间 (毫秒)
    response_body_limit_bytes: 2097152       # 响应体大小限制 (字节)，默认 2MB，防止大包攻击
  luogu:
    base_url: "http://180.184.87.86:8001"    # 洛谷数据服务地址
    api_prefix: "/v2"
    timeout_ms: 8000                         # 洛谷页面较慢，超时设长一点
    max_idle_conns: 200
    max_idle_conns_per_host: 100
    idle_conn_timeout_sec: 90
    retry_count: 2
    retry_wait_ms: 200
    retry_max_wait_ms: 2000
    response_body_limit_bytes: 4194304       # 洛谷题目内容可能较多，放宽到 4MB
  lanqiao:
    base_url: "http://180.184.87.86:8001"    # 蓝桥数据服务地址
    api_prefix: "/v2"
    timeout_ms: 10000
    max_idle_conns: 100
    max_idle_conns_per_host: 40
    idle_conn_timeout_sec: 90
    retry_count: 2
    retry_wait_ms: 200
    retry_max_wait_ms: 2000
    response_body_limit_bytes: 4194304
task:
  outbox_cleanup_retention_days: 7 # 成功消息保留一周，便于监控和审计
  outbox_failed_cleanup_retention_days: 30 # 失败消息保留更久，便于排查和补救
  distributed_lock_enabled: true # 是否启用分布式锁（如 Redlock）来协调定时任务，防止多实例重复执行
  distributed_lock_ttl_seconds: 30 # 分布式锁 TTL，单位秒，需略大于单次任务执行预估时间，防止死锁
  image_orphan_cleanup_cron: "@daily"  # 孤儿图片清理周期
  luogu_question_bank_warmup_enabled: true
  luogu_question_bank_warmup_batch_size: 500
  luogu_question_bank_warmup_lock_ttl_seconds: 300
  leetcode_question_bank_warmup_enabled: true
  leetcode_question_bank_warmup_batch_size: 500
  leetcode_question_bank_warmup_lock_ttl_seconds: 300
  luogu_sync_user_interval_seconds: 10
  leetcode_sync_user_interval_seconds: 10 # 力扣用户同步间隔秒数
  leetcode_sync_interval_seconds: 3600 # 力扣全量同步间隔秒数
  ranking_sync_interval_seconds: 3600
  oj_daily_stats_repair_cron: "@daily"
  oj_daily_stats_repair_batch_size: 100
  oj_daily_stats_repair_window_days: 35
  oj_task_dispatch_enabled: true
  oj_task_dispatch_interval_seconds: 10
  oj_task_dispatch_batch_size: 10
  oj_task_dispatch_worker_count: 1
  oj_task_snapshot_insert_batch_size: 500
  oj_task_execution_lock_ttl_seconds: 60
  disabled_user_cleanup_enabled: true
  disabled_user_retention_days: 30
  disabled_user_cleanup_cron: "@daily"
messaging:
  redis_stream_read_count: 1
  redis_stream_block_ms: 5000
  outbox_relay_lock_enabled: true
  outbox_relay_lock_ttl_seconds: 15
  luogu_bind_topic: "luogu.bind"
  luogu_bind_group: "luogu_bind_group"
  luogu_bind_consumer: "luogu_bind_consumer"
  leetcode_bind_topic: "leetcode.bind"
  leetcode_bind_group: "leetcode_bind_group"
  leetcode_bind_consumer: "leetcode_bind_consumer"
  oj_task_execution_trigger_topic: "oj_task_execution_trigger"
  oj_task_execution_trigger_group: "oj_task_execution_trigger_group"
  oj_task_execution_trigger_consumer: "oj_task_execution_trigger_consumer"
  oj_daily_stats_projection_topic: "oj_daily_stats_projection"
  oj_daily_stats_projection_group: "oj_daily_stats_projection_group"
  oj_daily_stats_projection_consumer: "oj_daily_stats_projection_consumer"
  cache_projection_topic: "cache_projection"
  cache_projection_group: "cache_projection_group"
  cache_projection_consumer: "cache_projection_consumer"
  permission_projection_topic: "permission_projection"
  permission_projection_group: "permission_projection_group"
  permission_projection_consumer: "permission_projection_consumer"
  permission_policy_reload_channel: "permission_policy_reload"
observability:
  enabled: true                      # 总开关
  service_name: "personal_assistant" # 服务名维度（需稳定）
  service_trace:
    enabled: true
    modules:
      - "jwt"
      - "user"
      - "oj"
      - "image"
      - "observability"
  propagation:
    enabled: true
    request_id_header: "X-Request-ID" # 本地日志排障 ID
    parse_w3c: true
    inject_w3c: true

  metrics:
    flush_interval_ms: 1000          # 内存桶刷库间隔
    db_batch_size: 500               # 每批写库行数
    fine_retention_days: 45          # 1m/5m 保留天数
    day_retention_days: 365          # 1d 保留天数
    week_retention_days: 0           # 1w 保留天数（0=不保留/不启用，按实现）
    rollup_cron: "10 2 * * *"        # rollup+清理定时

  traces:
    enabled: true                    # trace spans 开关
    # traces:stream 为 Go + Python(crawler_center) 共享的 Redis Stream。
    # Python 侧以 service="crawler_center" 推送 Span，Go consumer 统一消费入库。
    stream_key: "traces:stream"      # Redis Stream key (shared: Go producer + Python producer -> Go consumer)
    stream_group: "traces_persist_group" # consumer group
    stream_consumer: "go_trace_consumer" # consumer 名（建议实例唯一）
    stream_read_count: 200           # 单次读/claim 条数
    stream_block_ms: 1000            # 阻塞读取时长
    pending_idle_ms: 60000           # pending 回收阈值
    db_batch_size: 100               # spans 落库批量
    db_flush_interval_ms: 800        # spans 刷新间隔
    normal_queue_size: 4096          # 成功/非关键队列容量（满则丢）
    critical_queue_size: 1024        # 错误/关键队列容量
    enqueue_timeout_ms: 30           # 关键入队等待上限
    success_sample_rate: 1           # 成功采样率（1=全量）
    drop_success_on_overload: true   # 过载丢成功，保错误
    capture_error_payload: true      # 仅错误采集 payload
    max_payload_bytes: 4096          # payload 截断字节数
    capture_error_stack: true        # 错误 span 是否采集栈
    capture_error_detail: true       # 错误 span 是否采集结构化明细
    max_stack_bytes: 8192            # stack 截断字节数
    max_detail_bytes: 4096           # detail 截断字节数
    redact_keys:                     # 明细脱敏关键字
      - "password"
      - "token"
      - "authorization"
      - "cookie"
      - "secret"
      - "apikey"
      - "access_token"
      - "refresh_token"
    success_retention_days: 5        # 成功 spans 保留天数
    error_retention_days: 10         # 错误 spans 保留天数
    cleanup_cron: "30 2 * * *"       # traces 清理定时
